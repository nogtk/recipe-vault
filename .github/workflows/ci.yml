name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: 検証
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ソースを取得
        uses: actions/checkout@v6

      - name: Node.js を準備
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: 型チェックとテスト
        run: npm run check

      - name: Wrangler のデプロイ検証
        run: npm run deploy:dry-run
