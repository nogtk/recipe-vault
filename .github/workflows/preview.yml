name: Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: PRプレビュー
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: ソースを取得
        uses: actions/checkout@v6.0.3

      - name: Node.js を準備
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: 型チェックとテスト
        run: npm run check

      - name: Preview用Wrangler設定を生成
        env:
          CLOUDFLARE_PREVIEW_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_PREVIEW_D1_DATABASE_ID }}
        run: |
          mkdir -p .wrangler
          node --input-type=module --eval '
            import { readFileSync, writeFileSync } from "node:fs";

            const previewDatabaseId = process.env.CLOUDFLARE_PREVIEW_D1_DATABASE_ID;
            if (!previewDatabaseId) {
              throw new Error("GitHub Variable CLOUDFLARE_PREVIEW_D1_DATABASE_ID を設定してください。");
            }

            const config = JSON.parse(readFileSync("wrangler.jsonc", "utf8"));
            config.preview_urls = true;
            config.d1_databases = [
              {
                binding: "DB",
                database_name: "recipe-vault-preview",
                database_id: previewDatabaseId,
              },
            ];

            writeFileSync(".wrangler/preview.jsonc", `${JSON.stringify(config, null, 2)}\n`);
          '

      - name: Workers Preview URLを作成
        id: upload
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }} --config .wrangler/preview.jsonc --message "PR #${{ github.event.pull_request.number }} preview"
          wranglerVersion: "4.100.0"

      - name: Preview URLをPRへ投稿
        uses: actions/github-script@v8
        env:
          CMD_OUTPUT: ${{ steps.upload.outputs.command-output }}
        with:
          script: |
            const marker = "<!-- recipe-vault-preview -->";
            const output = process.env.CMD_OUTPUT || "";
            const previewUrl = output.match(/https:\/\/[^\s]+\.workers\.dev/)?.[0];
            const body = [
              marker,
              "Workers Preview URLを更新しました。",
              "",
              previewUrl ? `[プレビューを開く](${previewUrl})` : "Wranglerの出力からPreview URLを読み取れませんでした。Actionsログを確認してください。",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.user.type === "Bot" && comment.body?.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
