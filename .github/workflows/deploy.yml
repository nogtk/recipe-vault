name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: 本番デプロイ
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: ソースを取得
        uses: actions/checkout@v6.0.3

      - name: Node.js を準備
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: 型チェックとテスト
        run: npm run check

      - name: Cloudflare Workers にデプロイ
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          wranglerVersion: "4.100.0"
